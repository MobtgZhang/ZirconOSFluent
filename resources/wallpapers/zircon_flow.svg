<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0a1628"/>
      <stop offset="30%" stop-color="#0f2847"/>
      <stop offset="60%" stop-color="#1a4a78"/>
      <stop offset="100%" stop-color="#2b6cb0"/>
    </linearGradient>
    <radialGradient id="auroraCenter" cx="50%" cy="60%" r="55%">
      <stop offset="0%" stop-color="#0078d4" stop-opacity="0.3"/>
      <stop offset="50%" stop-color="#005a9e" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#003366" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="warmGlow" cx="75%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#f7a41d" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#f7a41d" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wave1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0078d4" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#2196f3" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#0078d4" stop-opacity="0.3"/>
    </linearGradient>
    <linearGradient id="wave2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#004578" stop-opacity="0.5"/>
      <stop offset="50%" stop-color="#0a6bc0" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#003060" stop-opacity="0.4"/>
    </linearGradient>
  </defs>

  <!-- Deep background -->
  <rect width="1920" height="1080" fill="url(#skyGrad)"/>

  <!-- Aurora glow -->
  <ellipse cx="960" cy="650" rx="1100" ry="500" fill="url(#auroraCenter)"/>

  <!-- Warm accent -->
  <ellipse cx="1440" cy="860" rx="600" ry="300" fill="url(#warmGlow)"/>

  <!-- Flowing wave forms (ZirconOS signature) -->
  <path d="M0,700 C320,620 640,780 960,680 C1280,580 1600,740 1920,660 L1920,1080 L0,1080 Z" fill="url(#wave2)" opacity="0.6"/>
  <path d="M0,780 C320,700 640,850 960,760 C1280,670 1600,820 1920,740 L1920,1080 L0,1080 Z" fill="url(#wave1)" opacity="0.5"/>
  <path d="M0,860 C320,800 640,920 960,840 C1280,760 1600,880 1920,820 L1920,1080 L0,1080 Z" fill="#061d36" opacity="0.7"/>

  <!-- Subtle particle dots -->
  <circle cx="200" cy="300" r="1.5" fill="white" opacity="0.3"/>
  <circle cx="580" cy="180" r="1" fill="white" opacity="0.25"/>
  <circle cx="900" cy="250" r="1.2" fill="white" opacity="0.35"/>
  <circle cx="1300" cy="150" r="1" fill="white" opacity="0.2"/>
  <circle cx="1650" cy="280" r="1.3" fill="white" opacity="0.3"/>
  <circle cx="400" cy="500" r="0.8" fill="white" opacity="0.2"/>
  <circle cx="1100" cy="400" r="1" fill="white" opacity="0.25"/>
  <circle cx="1750" cy="450" r="0.9" fill="white" opacity="0.2"/>
</svg>
