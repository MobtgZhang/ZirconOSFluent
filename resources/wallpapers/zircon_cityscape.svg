<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="duskSky" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0f0c29"/>
      <stop offset="40%" stop-color="#302b63"/>
      <stop offset="70%" stop-color="#24243e"/>
      <stop offset="100%" stop-color="#1a1a2e"/>
    </linearGradient>
    <radialGradient id="horizonGlow" cx="50%" cy="75%" r="40%">
      <stop offset="0%" stop-color="#0078d4" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#003060" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#003060" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="buildingFace" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#0f0f1a"/>
    </linearGradient>
  </defs>

  <rect width="1920" height="1080" fill="url(#duskSky)"/>
  <ellipse cx="960" cy="810" rx="1200" ry="400" fill="url(#horizonGlow)"/>

